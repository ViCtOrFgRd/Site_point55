<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Frontend - API de Produtos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        h1 { color: #333; }
        h2 { color: #666; margin-top: 30px; }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            border-left: 4px solid #4CAF50;
            background: #f1f8f4;
        }
        .test-result.error {
            border-left-color: #f44336;
            background: #ffebee;
        }
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 12px 24px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover {
            background: #0b7dda;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background: white;
        }
        .product-card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #333;
        }
        .product-card .price {
            color: #2196F3;
            font-weight: bold;
            font-size: 18px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .stat-box {
            flex: 1;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 32px;
            font-weight: bold;
            color: #2196F3;
        }
        .stat-box .label {
            color: #666;
            margin-top: 5px;
        }
        #loadingIndicator {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste Frontend - API de Produtos</h1>
        <p>Este teste simula como o frontend Next.js faz requisições para a API</p>
        
        <div class="stats">
            <div class="stat-box">
                <div class="number" id="totalProdutos">0</div>
                <div class="label">Total de Produtos</div>
            </div>
            <div class="stat-box">
                <div class="number" id="produtosExibidos">0</div>
                <div class="label">Produtos Exibidos</div>
            </div>
            <div class="stat-box">
                <div class="number" id="tempoResposta">0ms</div>
                <div class="label">Tempo de Resposta</div>
            </div>
        </div>

        <h2>Filtros</h2>
        <div class="filters">
            <div class="filter-group">
                <label>Categoria:</label>
                <select id="categoriaFiltro">
                    <option value="">Todas as Categorias</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Busca:</label>
                <input type="text" id="buscaFiltro" placeholder="Digite para buscar...">
            </div>
            <div class="filter-group">
                <label>Preço Mínimo:</label>
                <input type="number" id="precoMinFiltro" placeholder="R$ Min">
            </div>
            <div class="filter-group">
                <label>Preço Máximo:</label>
                <input type="number" id="precoMaxFiltro" placeholder="R$ Max">
            </div>
            <div class="filter-group">
                <label>Ordenar por:</label>
                <select id="ordenarFiltro">
                    <option value="data_criacao">Mais Recentes</option>
                    <option value="preco">Menor Preço</option>
                    <option value="nome">Nome (A-Z)</option>
                    <option value="vendas">Mais Vendidos</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Direção:</label>
                <select id="direcaoFiltro">
                    <option value="DESC">Decrescente</option>
                    <option value="ASC">Crescente</option>
                </select>
            </div>
        </div>
        
        <div>
            <button onclick="buscarProdutos()">🔍 Buscar Produtos</button>
            <button onclick="limparFiltros()" style="background: #757575;">🗑️ Limpar Filtros</button>
            <button onclick="buscarTodos()" style="background: #4CAF50;">📦 Todos os Produtos</button>
        </div>

        <div id="loadingIndicator" style="display: none;">⏳ Carregando produtos...</div>
        
        <div id="resultados"></div>
        
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let categorias = [];

        // Carregar categorias ao iniciar
        async function carregarCategorias() {
            try {
                const response = await fetch(`${API_URL}/categorias`);
                const data = await response.json();
                
                if (data.success && data.data) {
                    categorias = data.data;
                    const select = document.getElementById('categoriaFiltro');
                    categorias.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.nome;
                        select.appendChild(option);
                    });
                    
                    addResult(`✅ ${categorias.length} categorias carregadas`, false);
                }
            } catch (error) {
                addResult(`❌ Erro ao carregar categorias: ${error.message}`, true);
            }
        }

        async function buscarProdutos() {
            const loadingEl = document.getElementById('loadingIndicator');
            const resultsEl = document.getElementById('resultados');
            const gridEl = document.getElementById('productsGrid');
            
            loadingEl.style.display = 'block';
            resultsEl.innerHTML = '';
            gridEl.innerHTML = '';
            
            // Construir parâmetros
            const params = new URLSearchParams();
            
            const categoria = document.getElementById('categoriaFiltro').value;
            const busca = document.getElementById('buscaFiltro').value;
            const precoMin = document.getElementById('precoMinFiltro').value;
            const precoMax = document.getElementById('precoMaxFiltro').value;
            const ordem = document.getElementById('ordenarFiltro').value;
            const direcao = document.getElementById('direcaoFiltro').value;
            
            if (categoria) params.append('categoria', categoria);
            if (busca) params.append('busca', busca);
            if (precoMin) params.append('precoMin', precoMin);
            if (precoMax) params.append('precoMax', precoMax);
            if (ordem) params.append('ordem', ordem);
            if (direcao) params.append('direcao', direcao);
            params.append('limite', '100'); // Buscar 100 produtos
            
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_URL}/produtos?${params.toString()}`);
                const data = await response.json();
                const endTime = Date.now();
                
                document.getElementById('tempoResposta').textContent = `${endTime - startTime}ms`;
                
                if (data.success) {
                    document.getElementById('totalProdutos').textContent = data.total;
                    document.getElementById('produtosExibidos').textContent = data.count;
                    
                    addResult(`✅ Sucesso! ${data.total} produtos encontrados, exibindo ${data.count}`, false);
                    addResult(`📄 Página ${data.pagina} de ${data.totalPaginas}`, false);
                    
                    // Exibir produtos
                    if (data.data && data.data.length > 0) {
                        data.data.forEach(produto => {
                            const card = document.createElement('div');
                            card.className = 'product-card';
                            card.innerHTML = `
                                <h3>${produto.nome}</h3>
                                <div class="price">R$ ${parseFloat(produto.preco).toFixed(2)}</div>
                                <div style="font-size: 12px; color: #666; margin-top: 10px;">
                                    Categoria: ${produto.categoria_nome || 'N/A'}<br>
                                    Estoque: ${produto.estoque}
                                </div>
                            `;
                            gridEl.appendChild(card);
                        });
                    } else {
                        gridEl.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Nenhum produto encontrado</p>';
                    }
                } else {
                    addResult(`❌ Erro: ${data.error || 'Erro desconhecido'}`, true);
                }
            } catch (error) {
                addResult(`❌ Erro na requisição: ${error.message}`, true);
                if (error.message.includes('Failed to fetch')) {
                    addResult(`⚠️ Verifique se o backend está rodando na porta 5000`, true);
                }
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        function limparFiltros() {
            document.getElementById('categoriaFiltro').value = '';
            document.getElementById('buscaFiltro').value = '';
            document.getElementById('precoMinFiltro').value = '';
            document.getElementById('precoMaxFiltro').value = '';
            document.getElementById('ordenarFiltro').value = 'data_criacao';
            document.getElementById('direcaoFiltro').value = 'DESC';
            document.getElementById('resultados').innerHTML = '';
            document.getElementById('productsGrid').innerHTML = '';
        }

        function buscarTodos() {
            limparFiltros();
            buscarProdutos();
        }

        function addResult(message, isError = false) {
            const div = document.createElement('div');
            div.className = `test-result ${isError ? 'error' : ''}`;
            div.textContent = message;
            document.getElementById('resultados').appendChild(div);
        }

        // Carregar categorias ao iniciar
        carregarCategorias();
        
        // Buscar todos os produtos automaticamente
        setTimeout(() => buscarTodos(), 1000);
    </script>
</body>
</html>

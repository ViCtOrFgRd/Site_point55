version: '3.8'

services:
  postgres-test:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 140119
      POSTGRES_DB: point55_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: test
      DB_HOST: postgres-test
      DB_PORT: 5432
      DB_NAME: point55_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: test-secret-key
    ports:
      - "5001:5000"
    depends_on:
      postgres-test:
        condition: service_healthy
    command: npm start

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend-test:5000
    ports:
      - "3001:3000"
    depends_on:
      - backend-test
    command: sh -c "npm run build && npm start"

  e2e-tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    environment:
      BASE_URL: http://frontend-test:3000
      API_URL: http://backend-test:5000
      TEST_ADMIN_EMAIL: admin@point55.com
      TEST_ADMIN_PASSWORD: Admin123!
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./e2e/test-results:/app/test-results
      - ./e2e/playwright-report:/app/playwright-report
    depends_on:
      - frontend-test
      - backend-test
    command: npm test

volumes:
  postgres-data:
